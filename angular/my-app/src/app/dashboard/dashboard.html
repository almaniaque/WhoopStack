<main class="container py-5 dashboard-page">

    <section class="row g-3">

        <article class="col-12 col-md-6 col-xl-3">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="dashboard-card-title">Chiffre d'affaires</h5>
                    <h2 class="dashboard-value"></h2>
                    <p class="text-ws-success mb-0"></p>
                </section>
            </section>
        </article>

        <article class="col-12 col-md-6 col-xl-3">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="dashboard-card-title">Devis émis</h5>
                    <h2 class="dashboard-value"></h2>
                    <p class="text-ws-success mb-0"></p>
                </section>
            </section>
        </article>

        <article class="col-12 col-md-6 col-xl-3">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="dashboard-card-title">Taux de conversion</h5>
                    <h2 class="dashboard-value"></h2>
                    <p class="text-ws-success mb-0"></p>
                </section>
            </section>
        </article>

        <article class="col-12 col-md-6 col-xl-3">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="dashboard-card-title">Délai moyen de réponse</h5>
                    <h2 class="dashboard-value"></h2>
                    <p class="text-ws-success mb-0"></p>
                </section>
            </section>
        </article>

    </section>

    <section class="row g-3 mt-1">

        <article class="col-12 col-xl-8">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="card-title">Évolution du CA</h5>
                    <p class="card-text text-muted">6 derniers mois</p>

                    <canvas baseChart [data]="lineChartData" [options]="lineChartOptions" type="line">
                    </canvas>
                </section>
            </section>
        </article>

        <article class="col-12 col-xl-4">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body d-flex flex-column">
                    <h5 class="card-title">Devis / mois</h5>
                    <p class="card-text text-muted">Volume mensuel</p>
                    <div style="flex: 1; min-height: 0; position: relative;">
                        <canvas baseChart [data]="barChartData" [options]="barChartOptions" type="bar">
                        </canvas>
                    </div>
                </section>
            </section>
        </article>

    </section>

    <section class="row g-3 mt-1">

        <article class="col-12 col-xl-4">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="card-title">Répartition des statuts</h5>

                    <section class="position-relative d-flex justify-content-center align-items-center">
                        <canvas baseChart [data]="doughnutChartData" [options]="doughnutChartOptions"
                            [plugins]="doughnutPlugins" type="doughnut">
                        </canvas>
                        <article class="donut-center-label">
                            <aside class="dashboard-value">{{ totalDevis }}</aside>
                            <aside class="dashboard-card-title">devis</aside>
                        </article>
                    </section>

                </section>
            </section>
        </article>

        <article class="col-12 col-xl-8">
            <section class="card shadow-sm border-0 h-100">
                <section class="card-body">
                    <h5 class="card-title">Derniers devis</h5>

                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Montant</th>
                                <th>Date</th>
                                <th>Statut</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td></td>
                                <td></td>
                                <td>
                                    <span></span>
                                </td>
                                <td></td>
                            </tr>

                            <tr>
                                <td></td>
                                <td></td>
                                <td>
                                    <span></span>
                                </td>
                                <td></td>
                            </tr>

                            <tr>
                                <td></td>
                                <td></td>
                                <td>
                                    <span></span>
                                </td>
                                <td></td>
                            </tr>
                        </tbody>
                    </table>

                </section>
            </section>
        </article>

    </section>

</main>
