<div id="menu">

  <div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Rechercher..." class="search-input" [(ngModel)]="searchTerm" (input)="onSearch()">
    </div>
  </div>

  <div>
    <button class="devis" [class.active]="filtreActif === 'Tous'" (click)="setFiltre('Tous')">Tous</button>
    <button class="devis" [class.active]="filtreActif === 'Accepté'" (click)="setFiltre('Accepté')">Accepté</button>
    <button class="devis" [class.active]="filtreActif === 'En_attente'" (click)="setFiltre('En_attente')">En
      attente</button>
    <button class="devis" [class.active]="filtreActif === 'En_cours'" (click)="setFiltre('En_cours')">En cours</button>
    <button class="devis" [class.active]="filtreActif === 'Refusé'" (click)="setFiltre('Refusé')">Refusé</button>
  </div>

  <div>
    <button type="button" class="devis btn btn-outline-primary" mdbRipple rippleColor="dark">Exporter</button>
    <button type="button" class="devis btn btn-outline-secondary" mdbRipple rippleColor="dark">+ Nouveau devis</button>
  </div>

</div>

<div class="table-container">
  <table mat-table [dataSource]="pagedData">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Référence</th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <ng-container matColumnDef="client">
      <th mat-header-cell *matHeaderCellDef>Client</th>
      <td mat-cell *matCellDef="let element">{{ element.client?.name }}</td>
    </ng-container>

    <ng-container matColumnDef="categorie">
      <th mat-header-cell *matHeaderCellDef>Catégorie</th>
      <td mat-cell *matCellDef="let element">{{ element.categorie }}</td>
    </ng-container>

    <ng-container matColumnDef="montant">
      <th mat-header-cell *matHeaderCellDef>Montant</th>
      <td mat-cell *matCellDef="let element">{{ element.montant }} €</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let element">{{ element.date }}</td>
    </ng-container>

    <ng-container matColumnDef="echeance">
      <th mat-header-cell *matHeaderCellDef>Échéance</th>
      <td mat-cell *matCellDef="let element">{{ element.echeance }}</td>
    </ng-container>

    <ng-container matColumnDef="statut">
      <th mat-header-cell *matHeaderCellDef>Statut</th>
      <td mat-cell *matCellDef="let element">
        <button [class]="element.statut">
          <i [class]="getStatutIcon(element.statut)"></i>
          {{ formatStatut(element.statut) }}
        </button>
        <button *ngIf="element.statut === 'En_cours' || element.statut === 'Refusé'" class="modifier-btn"
          (click)="modifierDevis(element)">
          <i class="fas fa-pen"></i>
          Modifier le devis
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="devis">
      <th mat-header-cell *matHeaderCellDef>Devis</th>
      <td mat-cell *matCellDef="let element">
        <button class="btn-voir" (click)="voirDevis(element)">
          Voir devis
        </button>

      </td>
    </ng-container>


    <tr mat-header-row *matHeaderRowDef="displayedColumns" ;></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<mat-paginator [length]="dataSource.length" [pageSize]="8" (page)="onPageChange($event)">
</mat-paginator>


<app-devis-form *ngIf="devisSelectionne" [devis]="devisSelectionne" (fermer)="devisSelectionne = null">
</app-devis-form>
