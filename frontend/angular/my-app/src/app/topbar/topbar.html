<button class="btn btn-sidebar-toggle m-2" type="button" (click)="toggle()">
    <i class="bi bi-list fs-4"></i>
</button>

<!-- Sidebar -->
<div class="sidebar" [class.sidebar-closed]="!isOpen()">
    <div class="d-flex flex-column h-100">
        <!-- Logo -->
        <div class="sidebar-logo d-flex flex-column align-items-center p-1">
            <img src="image/WhoopStackLogo.png" alt="WhoopStack" class="logo-image">
            <img src="image/WhoopStackText.png" alt="WhoopStack" class="logo-text">
        </div>
        <hr>
        <!-- Navigation -->
        <div class="px-3 mt-3">
            <div class="nav-section-title">NAVIGATION</div>
            <nav class="nav flex-column gap-1 mt-2">
                <a class="nav-link" routerLink="/accueil" routerLinkActive="active">
                    <i class="bi bi-house"></i> Accueil
                </a>
                <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
                    <i class="bi bi-grid"></i> Tableau de bord
                </a>
                <a class="nav-link" routerLink="/menu-devis" routerLinkActive="active">
                    <i class="bi bi-file-text"></i> Devis
                </a>
                <a class="nav-link" routerLink="/clients" routerLinkActive="active">
                    <i class="bi bi-people"></i> Clients
                </a>
            </nav>
        </div>

        <!-- Bas de sidebar : menu Paramètres -->
        <div class="px-3 py-2 mt-auto">
            <a class="nav-link" role="button" [matMenuTriggerFor]="settingsMenu">
                <i class="bi bi-gear"></i> Paramètres
                <i class="bi bi-chevron-up ms-1"></i>
            </a>

            <mat-menu #settingsMenu="matMenu" yPosition="above">
                <a mat-menu-item routerLink="/parametres">
                    <i class="bi bi-sliders me-2"></i> Paramètres généraux
                </a>
                <button mat-menu-item (click)="logout()">
                    <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
                </button>
            </mat-menu>
        </div>
        <!-- Profil utilisateur -->
        <div class="user-profile d-flex align-items-center gap-2 p-3">
            <div class="avatar">LD</div>
            <div>
                <div class="user-name">Laurent Dumas</div>
                <div class="user-role">Admin</div>
            </div>
        </div>

    </div>
</div>

<!-- ↑ .sidebar se ferme ICI maintenant -->

<!-- Topbar : .sidebar -->
<nav class=" topbar d-flex justify-content-between align-items-center px-4 py-3 sticky-top"
    [class.topbar-expanded]="!isOpen()">
    <!-- Bouton toggle, toujours visible -->

    <div>
        <h1 class=" ms-5 topbar-title mb-0">{{currentPage()}}</h1>
        <p class=" ms-5 topbar-subtitle mb-0">{{currentPageInfo()}}</p>
    </div>

    <div class="d-flex align-items-center gap-2">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" placeholder="Rechercher..." class="search-input">
        </div>
        <button class="btn btn-notification" type="button">
            <i class="bi bi-bell"></i>
        </button>
    </div>
</nav>
